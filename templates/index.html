{% extends 'layout.html' %} {% block content %}
<div class="container">
  <div class="row">
    <h1>Home</h1>

    {% if is_logged_in %}
    <div class="alert alert-success" role="alert">
      Logged in as <strong>{{ user_email }}</strong>
    </div>
    {% else %}
    <div class="alert alert-secondary" role="alert">You are not logged in.</div>
    {% endif %}

    <p>Welcome to the site.</p>
    {% if not is_logged_in %}
    <p>
      <a class="btn btn-primary" href="/login.html">Log In</a>
      <a class="btn btn-outline-primary" href="/signup.html">Sign Up</a>
    </p>
    {% endif %}
  </div>
</div>
{% endblock %}
